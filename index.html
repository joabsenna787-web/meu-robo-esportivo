<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FUTEXCHANGE | OVER 2.5 PREDICTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { background: #07090e; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: #0f121a; border: 1px solid rgba(255, 255, 255, 0.03); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bar-glow { box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-[1200px] mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter">FutExchange <span class="text-green-500">Over 2.5</span></h1>
                <p class="text-[9px] text-slate-500 mono uppercase tracking-[3px]">Algorithmic Goal Prediction Engine</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Account Balance</p>
                <p class="text-xl font-black mono uppercase">USD 6.30 <span class="text-green-500 text-xs">CENT</span></p>
            </div>
        </header>

        <div id="radar-jogos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        async function loadPredictor() {
            try {
                const res = await fetch('/ao-vivo');
                const data = await res.json();
                const container = document.getElementById('radar-jogos');
                
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-20 text-center glass-panel rounded-3xl opacity-50 italic text-xs uppercase tracking-widest">Buscando oportunidades de alta probabilidade...</div>`;
                    return;
                }

                container.innerHTML = data.map(j => `
                    <div class="glass-panel p-6 rounded-3xl relative overflow-hidden group hover:border-green-500/30 transition-all duration-500">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[10px] font-bold text-slate-500 uppercase truncate max-w-[150px]">${j.league.name}</span>
                            <span class="bg-green-500/10 text-green-500 text-[10px] font-black px-2 py-1 rounded-lg mono">${j.overProb}% VALUE</span>
                        </div>
                        
                        <div class="flex flex-col gap-2 mb-8">
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold truncate">${j.teams.home.name}</span>
                                <span class="text-[10px] text-slate-600 font-bold italic">HOME</span>
                            </div>
                            <div class="h-[1px] bg-white/5 w-full my-1"></div>
                            <div class="flex justify-between items-center">
                                <span class="text-sm font-bold truncate">${j.teams.away.name}</span>
                                <span class="text-[10px] text-slate-600 font-bold italic">AWAY</span>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex justify-between items-end">
                                <p class="text-[9px] uppercase font-black text-slate-500 tracking-widest">Predictive Intensity</p>
                                <p class="text-sm font-black text-green-500 mono">${j.overProb}%</p>
                            </div>
                            <div class="w-full h-2 bg-black/40 rounded-full p-[2px]">
                                <div class="h-full bg-green-500 rounded-full bar-glow transition-all duration-1000" style="width: ${j.overProb}%"></div>
                            </div>
                        </div>
                        
                        <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[8px] text-slate-600 uppercase mono italic">Suggested: Over 2.5 FT</span>
                            <span class="text-[10px] font-bold text-white uppercase bg-white/5 px-2 py-1 rounded">Pre-Live</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.log("Erro ao carregar dados."); }
        }

        loadPredictor();
        setInterval(loadPredictor, 300000); // Atualiza a cada 5 minutos
    </script>
</body>
</html>
