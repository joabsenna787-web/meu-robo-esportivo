<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FUTEXCHANGE PRO | QUANTITATIVE ANALYZER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { background: #020408; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-pro { 
            background: linear-gradient(145deg, #0f172a 0%, #020617 100%);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-white/5 pb-8">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic text-blue-500 uppercase">FutExchange <span class="text-white underline">Pro</span></h1>
                <p class="text-[10px] mono text-slate-500 mt-2 uppercase tracking-[4px]">Estratégia Quantitativa Over 2.5</p>
            </div>
            <div class="mt-6 md:mt-0 text-right bg-blue-500/5 p-4 rounded-2xl border border-blue-500/20">
                <p class="text-[9px] text-blue-400 font-bold uppercase mono">Saldo Cent-Account</p>
                <p class="text-2xl font-black text-white mono">USD 6.30</p>
            </div>
        </header>

        <div id="grid-main" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <p class="animate-pulse mono text-blue-500 uppercase text-xs">Sincronizando com o mercado de Odds...</p>
            </div>
        </div>
    </div>

    <script>
        async function updateScanner() {
            try {
                const res = await fetch('/ao-vivo');
                const data = await res.json();
                const container = document.getElementById('grid-main');

                container.innerHTML = data.map(j => {
                    let badgeColor = j.probabilidade > 80 ? 'bg-green-500' : 'bg-blue-500';
                    let statusText = j.probabilidade > 80 ? 'HIGH PROBABILITY' : 'MARKET VALUE';
                    
                    return `
                    <div class="card-pro p-6 rounded-[2rem] glow-green relative group">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-black px-3 py-1 rounded-full ${badgeColor}/10 ${badgeColor.replace('bg-', 'text-')} mono uppercase">
                                ${statusText}
                            </span>
                            <span class="text-[10px] text-slate-500 mono font-bold">${j.hora}</span>
                        </div>

                        <div class="mb-8 space-y-4">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-blue-500/50 font-black uppercase mb-1">Casa</span>
                                <span class="text-lg font-black text-white truncate uppercase italic tracking-tight">${j.casa}</span>
                            </div>
                            <div class="flex flex-col border-l-2 border-blue-500/20 pl-4">
                                <span class="text-[10px] text-slate-600 font-black uppercase mb-1">Visitante</span>
                                <span class="text-lg font-black text-slate-300 truncate uppercase italic tracking-tight">${j.fora}</span>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="flex justify-between items-end">
                                <span class="text-[9px] font-black text-slate-500 uppercase">Score de Gols</span>
                                <span class="text-xl font-black text-white mono">${j.probabilidade}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div class="h-full ${badgeColor} transition-all duration-1000" style="width: ${j.probabilidade}%"></div>
                            </div>
                        </div>

                        <div class="mt-8 flex gap-2">
                            <div class="flex-1 bg-white/5 p-3 rounded-2xl text-center border border-white/5">
                                <p class="text-[8px] text-slate-500 uppercase font-bold mb-1">Odd Mercado</p>
                                <p class="text-sm font-black text-blue-400 mono">@${j.odd}</p>
                            </div>
                            <a href="https://www.bet365.com" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-500 transition-colors rounded-2xl flex items-center justify-center text-[10px] font-black uppercase tracking-tighter">
                                Analisar Bet
                            </a>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) { console.log(e); }
        }

        updateScanner();
        setInterval(updateScanner, 600000);
    </script>
</body>
</html>
