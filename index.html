<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FutBot Exchange | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e11; color: #eaecef; font-family: sans-serif; }
        .card { background: #161a1e; border: 1px solid #2b2f36; border-radius: 12px; }
        .btn-green { background: #2ebd85; color: white; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="flex justify-between items-center mb-8 border-b border-[#2b2f36] pb-4">
        <div class="text-2xl font-black text-yellow-500 italic">FUT<span class="text-white">EXCHANGE</span></div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Status do Servidor</p>
            <p class="text-green-500 font-bold text-xs">● OPERACIONAL</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <h2 class="text-slate-400 text-xs font-bold uppercase mb-4 tracking-widest">Scanner de Pressão Ao Vivo</h2>
            <div id="lista-jogos" class="space-y-3">
                <div class="card p-8 text-center text-slate-600 italic">Buscando dados da API...</div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="card p-6 border-t-4 border-yellow-500">
                <h3 class="text-sm font-bold mb-4 uppercase">Gestão de Risco</h3>
                <div class="bg-black/20 p-4 rounded-lg mb-4">
                    <p class="text-[10px] text-slate-500">BANCA ESTIMADA</p>
                    <p class="text-xl font-bold text-green-400">R$ 2.450,00</p>
                </div>
                <button class="w-full btn-green py-3 rounded-lg text-sm uppercase">Configurar Stake</button>
            </div>
        </aside>
    </div>

    <script>
        async function atualizarPainel() {
            try {
                const res = await fetch('/ao-vivo');
                const jogos = await res.json();
                const container = document.getElementById('lista-jogos');

                if (jogos.length > 0) {
                    container.innerHTML = jogos.map(j => `
                        <div class="card p-5 flex justify-between items-center hover:border-slate-500 transition cursor-pointer">
                            <div class="w-1/3 font-bold text-lg">${j.teams.home.name}</div>
                            <div class="w-1/3 text-center">
                                <span class="bg-[#2b2f36] px-4 py-1 rounded text-yellow-500 font-bold">${j.goals.home} - ${j.goals.away}</span>
                                <p class="text-[10px] mt-2 font-bold text-slate-500 tracking-tighter">${j.fixture.status.elapsed}' MIN</p>
                            </div>
                            <div class="w-1/3 text-right font-bold text-lg">${j.teams.away.name}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="card p-8 text-center text-slate-500">Nenhum jogo importante rolando agora.</div>';
                }
            } catch(e) { console.error("Erro ao carregar jogos."); }
        }
        setInterval(atualizarPainel, 30000);
        atualizarPainel();
    </script>
</body>
</html>
