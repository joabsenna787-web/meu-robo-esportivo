<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FUTEXCHANGE ULTRA | TRADER TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { background: #0a0c10; color: #cbd5e1; font-family: 'JetBrains Mono', monospace; }
        .panel-gold { border: 1px solid rgba(234, 179, 8, 0.1); background: rgba(15, 23, 42, 0.8); }
        .btn-trade { background: #eab308; color: #000; font-weight: 800; transition: 0.3s; }
        .btn-trade:hover { background: #facc15; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-3xl font-black text-white italic">FUT<span class="text-yellow-500">EXCHANGE</span></h1>
                <p class="text-[10px] text-yellow-500/50 font-bold tracking-[4px]">ALGORITHMIC TRADING SYSTEM</p>
            </div>
            <div class="flex gap-6 mt-4 md:mt-0">
                <div class="text-right">
                    <p class="text-[9px] text-slate-500 uppercase">Banca Cent</p>
                    <p class="text-xl font-bold text-white">USD 6.30</p>
                </div>
                <div class="text-right border-l border-white/10 pl-6">
                    <p class="text-[9px] text-slate-500 uppercase">Sinais Hoje</p>
                    <p class="text-xl font-bold text-green-500">+12</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="space-y-4">
                <div class="panel-gold p-6 rounded-2xl">
                    <h2 class="text-xs font-bold text-yellow-500 mb-4 uppercase">Calculadora Pro</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between text-xs">
                            <span class="text-slate-500">Stake (2%)</span>
                            <span class="text-white">USD 0.12</span>
                        </div>
                        <div class="flex justify-between text-xs">
                            <span class="text-slate-500">Meta Diária</span>
                            <span class="text-white">USD 0.50</span>
                        </div>
                    </div>
                </div>
                <button class="btn-trade w-full py-4 rounded-2xl text-xs uppercase tracking-widest">Ajustar Filtros</button>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Scanner de Alta Pressão (HT)
                    </h3>
                </div>
                
                <div id="radar-jogos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function loadRadar() {
            try {
                const res = await fetch('/ao-vivo');
                const data = await res.json();
                const container = document.getElementById('radar-jogos');
                
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-16 text-center panel-gold rounded-3xl opacity-40 text-xs italic">Aguardando ligas compatíveis com o plano atual...</div>`;
                    return;
                }

                container.innerHTML = data.map(j => {
                    const tempo = j.fixture.status.elapsed;
                    const isZone = tempo >= 15 && tempo <= 30;
                    const pS = Math.floor(Math.random() * 50) + 20;

                    return `
                        <div class="panel-gold p-5 rounded-2xl transition-all ${isZone ? 'border-yellow-500/50 bg-yellow-500/5' : 'opacity-70'}">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-bold px-2 py-1 rounded bg-black text-yellow-500">${tempo}' MIN</span>
                                <span class="text-[8px] text-slate-500 uppercase font-black">${j.league.name}</span>
                            </div>
                            <div class="flex justify-between items-center font-bold text-sm mb-4">
                                <span class="truncate w-1/3">${j.teams.home.name}</span>
                                <span class="text-lg bg-white/5 px-3 py-1 rounded-lg">${j.goals.home}-${j.goals.away}</span>
                                <span class="truncate w-1/3 text-right">${j.teams.away.name}</span>
                            </div>
                            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-yellow-500 shadow-[0_0_8px_#eab308]" style="width: ${pS}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.log("Erro de atualização"); }
        }
        setInterval(loadRadar, 30000);
        loadRadar();
    </script>
</body>
</html>
