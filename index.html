<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FUTEXCHANGE PRO | MARKET INTELLIGENCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #05070a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card-trader { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid rgba(255,255,255,0.05); }
        .glow-yellow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        .pulsar { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter text-yellow-500">FUTEXCHANGE <span class="text-white">PRO</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Sincronizado com API-Sports Live Data</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold">CONTA CENT: <span class="text-green-500">ATIVA</span></p>
                <p class="text-xl font-black">USD 6.30</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="space-y-6">
                <div class="card-trader p-6 rounded-3xl border-yellow-500/20 glow-yellow">
                    <h2 class="text-sm font-black uppercase mb-4 text-yellow-500 tracking-widest">Gestão de Risco</h2>
                    <div class="space-y-4">
                        <div>
                            <p class="text-[10px] text-slate-400">STAKE RECOMENDADA (2%)</p>
                            <p class="text-2xl font-black">USD 0.12</p>
                        </div>
                        <div class="p-4 bg-yellow-500/10 rounded-2xl border border-yellow-500/20">
                            <p class="text-[10px] text-yellow-500 font-bold">INFO INSIDE</p>
                            <p class="text-[11px] leading-relaxed mt-1 italic text-slate-300">"Priorize jogos com APPI > 50 entre 15' e 25' para máxima assertividade."</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Scanner Live Market</h3>
                    <span class="pulsar text-[10px] bg-green-500/20 text-green-500 px-2 py-1 rounded-full font-bold">● LIVE NOW</span>
                </div>
                
                <div id="lista-jogos" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchGames() {
            const res = await fetch('/ao-vivo');
            const data = await res.json();
            const container = document.getElementById('lista-jogos');
            
            if(!data || data.length === 0) {
                container.innerHTML = `<div class="card-trader p-12 rounded-3xl text-center opacity-40">Aguardando início de novos confrontos importantes...</div>`;
                return;
            }

            container.innerHTML = data.map(j => {
                const tempo = j.fixture.status.elapsed;
                const pressao = Math.floor(Math.random() * 70) + 15; // Simulado para o painel
                const isHT = tempo >= 15 && tempo <= 30;

                return `
                    <div class="card-trader p-6 rounded-3xl transition-all hover:border-yellow-500/50 ${isHT ? 'border-yellow-500/40 bg-yellow-500/5' : ''}">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black bg-slate-800 px-3 py-1 rounded-full">${tempo}' MIN</span>
                            <span class="text-[10px] text-slate-500 font-bold uppercase">${j.league.name}</span>
                        </div>
                        <div class="flex justify-between items-center px-4">
                            <div class="w-1/3 text-center">
                                <p class="text-sm font-black">${j.teams.home.name}</p>
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-3xl font-black">${j.goals.home} - ${j.goals.away}</span>
                                <span class="text-[9px] font-bold text-yellow-500 mt-1">${pressao} APPI</span>
                            </div>
                            <div class="w-1/3 text-center">
                                <p class="text-sm font-black">${j.teams.away.name}</p>
                            </div>
                        </div>
                        <div class="mt-4 w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                            <div class="h-full bg-yellow-500" style="width: ${pressao}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        setInterval(fetchGames, 30000);
        fetchGames();
    </script>
</body>
</html>
