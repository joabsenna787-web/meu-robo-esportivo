<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutBot Pro | Elite Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #080a0c; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(22, 26, 30, 0.8); border: 1px solid #2d3748; backdrop-filter: blur(10px); }
        .high-pressure { border: 2px solid #f6ad55 !important; box-shadow: 0 0 15px rgba(246, 173, 85, 0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { border-color: #f6ad55; } 50% { border-color: #ed8936; } 100% { border-color: #f6ad55; } }
        .pressure-bar { height: 6px; border-radius: 3px; transition: width 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-6">
    <header class="flex justify-between items-center mb-8 max-w-6xl mx-auto">
        <div>
            <h1 class="text-3xl font-black tracking-tighter italic text-white">FUT<span class="text-yellow-500">EXCHANGE</span> <span class="text-[10px] bg-yellow-500 text-black px-2 py-0.5 rounded ml-2 not-italic">PRO V2</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Live Market Intelligence</p>
        </div>
        <div class="text-right">
            <div id="status-ball" class="inline-block w-2 h-2 bg-green-500 rounded-full mr-2"></div>
            <span class="text-green-500 font-bold text-xs uppercase tracking-widest">Servidor Operacional</span>
            <p id="last-update" class="text-[9px] text-slate-600 mt-1 uppercase">Atualizando agora...</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="lg:col-span-3 space-y-4">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-black uppercase text-slate-400">Scanner de Pressão em Tempo Real</h2>
                <span class="text-[10px] text-slate-500">FILTRO: APPI > 20</span>
            </div>
            
            <div id="lista-jogos" class="grid gap-4">
                </div>
        </div>

        <div class="space-y-6">
            <div class="glass-card p-6 rounded-2xl border-t-4 border-yellow-500">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-4">Gestão de Banca</h3>
                <div class="space-y-4">
                    <div class="bg-black/40 p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500 font-bold">SALDO ATUAL</p>
                        <p class="text-2xl font-black text-green-400">R$ 2.450,00</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500 font-bold">STAKE RECOMENDADA</p>
                        <p class="text-lg font-black text-white">R$ 50,00 <span class="text-[10px] text-slate-500 font-normal">(2%)</span></p>
                    </div>
                    <button class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-black py-4 rounded-xl transition text-xs uppercase">Configurar Robô</button>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl">
                <h3 class="text-xs font-black uppercase text-slate-400 mb-2">Histórico Rápido</h3>
                <div id="logs" class="text-[10px] font-mono text-slate-500 space-y-2">
                    <p>> Scanner iniciado...</p>
                    <p>> Conectado à API-Sports...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const audioAlerta = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        async function buscarDados() {
            try {
                const res = await fetch('/ao-vivo');
                const jogos = await res.json();
                const container = document.getElementById('lista-jogos');
                const logs = document.getElementById('logs');
                
                if (!jogos || jogos.length === 0) {
                    container.innerHTML = '<div class="glass-card p-12 text-center text-slate-600 rounded-2xl italic">Aguardando início de novas partidas importantes...</div>';
                    return;
                }

                container.innerHTML = jogos.map(j => {
                    const tempo = j.fixture.status.elapsed;
                    // Simulação de pressão para o visual (já que a lista geral não traz stats detalhados na mesma chamada)
                    const pressaoTotal = Math.floor(Math.random() * 80) + 10; 
                    const isHigh = pressaoTotal > 55;

                    return `
                        <div class="glass-card p-5 rounded-2xl transition-all duration-500 ${isHigh ? 'high-pressure' : ''}">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center space-x-2">
                                    <span class="bg-yellow-500 text-black text-[9px] font-black px-2 py-0.5 rounded">${tempo}' MIN</span>
                                    ${isHigh ? '<span class="animate__animated animate__flash animate__infinite text-orange-500">🔥</span>' : ''}
                                </div>
                                <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${j.league.name}</div>
                            </div>

                            <div class="flex justify-between items-center px-4">
                                <div class="w-2/5 text-right font-black text-lg truncate">${j.teams.home.name}</div>
                                <div class="w-1/5 text-center">
                                    <span class="text-2xl font-black bg-white/5 px-4 py-2 rounded-xl border border-white/10">
                                        ${j.goals.home} - ${j.goals.away}
                                    </span>
                                </div>
                                <div class="w-2/5 text-left font-black text-lg truncate">${j.teams.away.name}</div>
                            </div>

                            <div class="mt-6">
                                <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase">
                                    <span>Pressão do Jogo</span>
                                    <span class="${isHigh ? 'text-orange-500' : ''}">${pressaoTotal} APPI</span>
                                </div>
                                <div class="w-full bg-white/5 rounded-full h-1.5">
                                    <div class="pressure-bar ${isHigh ? 'bg-orange-500' : 'bg-yellow-500'}" style="width: ${pressaoTotal}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('last-update').innerText = 'Última atualização: ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Erro ao atualizar painel");
            }
        }

        setInterval(buscarDados, 30000); // Atualiza o visual a cada 30 segundos
        buscarDados();
    </script>
</body>
</html>
