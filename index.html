<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FUTEXCHANGE | DUAL STRATEGY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap');
        body { background: #05070a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card-pro { background: #0f172a; border: 1px solid rgba(59, 130, 246, 0.1); transition: 0.3s; }
        .btn-active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <h1 class="text-3xl font-black italic uppercase italic">FutExchange <span class="text-blue-500">Dual</span></h1>
            
            <div class="flex bg-slate-900 p-1 rounded-xl border border-white/5">
                <button onclick="switchTab('over')" id="btn-over" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all btn-active">Over 2.5 Gols</button>
                <button onclick="switchTab('btts')" id="btn-btts" class="px-6 py-2 rounded-lg text-[10px] font-black uppercase transition-all text-slate-500">Ambas Marcam</button>
            </div>
        </header>

        <div id="grid-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        let currentData = { over: [], btts: [] };
        let activeMode = 'over';

        async function fetchData() {
            try {
                const res = await fetch('/analise-completa');
                currentData = await res.json();
                renderCards();
            } catch (e) { console.error(e); }
        }

        function switchTab(mode) {
            activeMode = mode;
            document.getElementById('btn-over').classList.toggle('btn-active', mode === 'over');
            document.getElementById('btn-over').classList.toggle('text-slate-500', mode !== 'over');
            document.getElementById('btn-btts').classList.toggle('btn-active', mode === 'btts');
            document.getElementById('btn-btts').classList.toggle('text-slate-500', mode !== 'btts');
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('grid-cards');
            const list = currentData[activeMode];

            if (!list || list.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 mono uppercase text-xs">Nenhuma entrada de valor detectada...</div>`;
                return;
            }

            container.innerHTML = list.map(j => `
                <div class="card-pro p-6 rounded-3xl relative overflow-hidden group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[9px] font-black text-slate-500 uppercase">${j.liga}</span>
                        <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded-lg mono font-bold">${j.hora}</span>
                    </div>

                    <div class="space-y-2 mb-6">
                        <p class="text-sm font-black truncate">${j.casa}</p>
                        <p class="text-[10px] text-slate-700 italic font-black uppercase">v s</p>
                        <p class="text-sm font-black truncate">${j.fora}</p>
                    </div>

                    <div class="pt-4 border-t border-white/5">
                        <div class="flex justify-between items-end mb-2">
                            <span class="text-[9px] text-slate-500 font-bold uppercase">${activeMode === 'over' ? 'Prob. Over 2.5' : 'Prob. Ambas Marcam'}</span>
                            <span class="text-sm font-black text-blue-500 mono">${j.probabilidade}%</span>
                        </div>
                        <div class="w-full h-1.5 bg-black/40 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500" style="width: ${j.probabilidade}%"></div>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="text-[10px] font-black text-blue-400 mono">ODD @${j.odd}</span>
                        <a href="https://www.bet365.com" target="_blank" class="text-[10px] font-black uppercase text-white hover:text-blue-400">Analisar →</a>
                    </div>
                </div>
            `).join('');
        }

        fetchData();
        setInterval(fetchData, 600000);
    </script>
</body>
</html>
